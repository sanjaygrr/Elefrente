{% extends 'core/base.html' %}

{% block title %}Elefrente - Aprende Español de Forma Divertida{% endblock %}

{% block extra_css %}
<style>
    /* Hero Section */
    .hero {
        min-height: 80vh;
        display: flex;
        align-items: center;
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 0 0 50px 50px;
        margin: -2rem -2rem 4rem -2rem;
        padding: 2rem;
    }

    .hero::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: moveGrid 20s linear infinite;
    }

    @keyframes moveGrid {
        0% { transform: translate(0, 0); }
        100% { transform: translate(50px, 50px); }
    }

    .hero-content {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4rem;
        align-items: center;
        position: relative;
        z-index: 1;
    }

    .hero-text h1 {
        font-size: 4rem;
        font-weight: 900;
        color: white;
        margin-bottom: 1.5rem;
        line-height: 1.1;
        animation: slideInLeft 0.8s ease-out;
    }

    .hero-text h1 span {
        background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    @keyframes slideInLeft {
        from {
            opacity: 0;
            transform: translateX(-50px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .hero-text p {
        font-size: 1.3rem;
        color: rgba(255,255,255,0.9);
        margin-bottom: 2rem;
        animation: slideInLeft 0.8s ease-out 0.2s both;
    }

    .hero-buttons {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        animation: slideInLeft 0.8s ease-out 0.4s both;
    }

    .btn-hero {
        padding: 1rem 2rem;
        font-size: 1.1rem;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
    }

    .btn-hero-primary {
        background: white;
        color: #667eea;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .btn-hero-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    .btn-hero-secondary {
        background: rgba(255,255,255,0.2);
        color: white;
        border: 2px solid white;
        backdrop-filter: blur(10px);
    }

    .btn-hero-secondary:hover {
        background: white;
        color: #667eea;
        transform: translateY(-3px);
    }

    .hero-image {
        position: relative;
        animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }

    .hero-image-wrapper {
        position: relative;
        width: 100%;
        height: 500px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .floating-card {
        position: absolute;
        background: rgba(255,255,255,0.9);
        border-radius: 20px;
        padding: 1.5rem;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        backdrop-filter: blur(10px);
        animation: floatCard 8s ease-in-out infinite;
    }

    @keyframes floatCard {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-10px) rotate(2deg); }
        75% { transform: translateY(10px) rotate(-2deg); }
    }

    .floating-card:nth-child(1) {
        top: 20%;
        left: 10%;
        animation-delay: 0s;
    }

    .floating-card:nth-child(2) {
        top: 50%;
        right: 10%;
        animation-delay: 2s;
    }

    .floating-card:nth-child(3) {
        bottom: 20%;
        left: 20%;
        animation-delay: 4s;
    }

    .floating-card h3 {
        color: #667eea;
        margin-bottom: 0.5rem;
        font-size: 1.2rem;
    }

    .floating-card p {
        color: #636E72;
        font-size: 0.9rem;
    }

    /* Features Section */
    .features {
        padding: 4rem 0;
        background: white;
        border-radius: 30px;
        margin: 0 -2rem;
        padding-left: 2rem;
        padding-right: 2rem;
    }

    .features h2 {
        text-align: center;
        font-size: 3rem;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .features-subtitle {
        text-align: center;
        font-size: 1.2rem;
        color: #636E72;
        margin-bottom: 3rem;
    }

    .features-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
        max-width: 1000px;
        margin: 0 auto;
    }

    .feature-card {
        background: #F7F7F7;
        padding: 2rem;
        border-radius: 20px;
        text-align: center;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .feature-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(90deg, #FF6B6B, #4ECDC4);
        transform: scaleX(0);
        transition: transform 0.3s ease;
    }

    .feature-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .feature-card:hover::before {
        transform: scaleX(1);
    }

    .feature-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: white;
        position: relative;
        animation: pulse 2s ease-in-out infinite;
    }

    .feature-card h3 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        color: #2D3436;
    }

    .feature-card p {
        color: #636E72;
        line-height: 1.6;
    }

    /* Stats Section */
    .stats {
        background: linear-gradient(135deg, #FF6B6B 0%, #EE5A5A 100%);
        padding: 4rem 2rem;
        border-radius: 30px;
        margin: 4rem -2rem;
        position: relative;
        overflow: hidden;
    }

    .stats::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        animation: movePattern 30s linear infinite;
    }

    @keyframes movePattern {
        0% { transform: translate(0, 0); }
        100% { transform: translate(60px, 60px); }
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 3rem;
        max-width: 800px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
    }

    .stat-item {
        text-align: center;
        color: white;
    }

    .stat-number {
        font-size: 3rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        display: block;
    }

    .stat-label {
        font-size: 1.1rem;
        opacity: 0.9;
    }

    /* CTA Section */
    .cta {
        background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
        padding: 4rem 2rem;
        border-radius: 30px;
        text-align: center;
        margin: 4rem -2rem -4rem -2rem;
        position: relative;
        overflow: hidden;
    }

    .cta::before {
        content: '¡';
        position: absolute;
        top: -100px;
        right: -100px;
        font-size: 400px;
        color: rgba(255,255,255,0.05);
        font-weight: 900;
        transform: rotate(-15deg);
    }

    .cta h2 {
        font-size: 3rem;
        color: white;
        margin-bottom: 1rem;
        position: relative;
        z-index: 1;
    }

    .cta p {
        font-size: 1.3rem;
        color: rgba(255,255,255,0.9);
        margin-bottom: 2rem;
        position: relative;
        z-index: 1;
    }

    .cta .btn-hero-primary {
        background: white;
        color: #4ECDC4;
        font-size: 1.2rem;
        padding: 1.2rem 3rem;
        position: relative;
        z-index: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .hero-content {
            grid-template-columns: 1fr;
            text-align: center;
        }

        .hero-text h1 {
            font-size: 2.5rem;
        }

        .hero-buttons {
            justify-content: center;
        }

        .hero-image-wrapper {
            height: 300px;
        }

        .floating-card {
            transform: scale(0.8);
        }

        .features {
            margin: 0;
            border-radius: 0;
        }

        .stats, .cta {
            margin-left: 0;
            margin-right: 0;
            border-radius: 0;
        }
    }
</style>
{% endblock %}

{% block content %}
    <h2>Bienvenido a Elefrente</h2>
    <p>Tu plataforma para aprender español.</p>
{% endblock %}
